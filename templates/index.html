<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DCOL - Secure Cloud Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; flex-direction: column; }
        
        #login-container { position: fixed; inset: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        #dashboard-container { display: none; padding: 20px; flex-direction: column; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .video-container { position: relative; background: #000; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; }
        .panel { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid #334155; }
        .log-item { background: #0f172a; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 0.8rem; border-left: 4px solid #2563eb; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2>📹 DCOL Secure Login</h2>
            <input type="text" id="username" placeholder="Admin ID">
            <input type="password" id="password" placeholder="Security Key">
            <button onclick="attemptLogin()">Access Terminal</button>
            <p id="error" style="color: #ef4444; margin-top: 10px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="dashboard-container">
        <h1 style="margin-bottom: 20px;">Surveillance & Security</h1>
        <div class="dashboard-grid">
            <div class="video-container">
                <img id="cctv-stream" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="panel">
                <h3>🛡️ Security Logs</h3>
                <div id="logs" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script>
        async function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await response.json();

            if (data.success) {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'flex';
                document.getElementById('cctv-stream').src = "/video_feed";
                startLogPolling();
            } else {
                document.getElementById('error').innerText = data.message;
            }
        }

        async function startLogPolling() {
            setInterval(async () => {
                const res = await fetch('/api/security_logs');
                const logs = await res.json();
                const container = document.getElementById('logs');
                container.innerHTML = logs.map(l => `
                    <div class="log-item">
                        <b>${l.status}</b> [${l.time}]<br>IP: ${l.ip} | User: ${l.username}
                    </div>
                `).join('');
            }, 3000);
        }
    </script>
</body>
</html>
