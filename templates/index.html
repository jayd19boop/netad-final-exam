<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCOL // Advanced SOC Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --panel-bg: #0f172a;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* AUTH OVERLAY */
        #login-container { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: var(--panel-bg); padding: 2.5rem; border-radius: 1rem; border: 1px solid #1e293b; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; background: #020617; border: 1px solid #334155; color: white; border-radius: 0.5rem; }
        .btn-auth { width: 100%; padding: 1rem; background: var(--accent-blue); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; margin-top: 1rem; transition: 0.3s; }
        .btn-auth:hover { background: #2563eb; filter: brightness(1.2); }

        /* DASHBOARD GRID */
        #dashboard-container { display: none; padding: 1rem; height: 100vh; grid-template-columns: 300px 1fr 350px; grid-template-rows: auto 1fr; gap: 1rem; }
        header { grid-column: 1 / -1; background: var(--panel-bg); padding: 1rem 1.5rem; border-radius: 0.75rem; border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }

        .panel { background: var(--panel-bg); border-radius: 0.75rem; border: 1px solid #1e293b; padding: 1.25rem; display: flex; flex-direction: column; }
        .panel-header { font-size: 0.75rem; font-weight: 800; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }

        /* CAMERA VIEWPORT */
        .viewport { position: relative; background: #000; flex-grow: 1; border-radius: 0.5rem; border: 2px solid #1e293b; overflow: hidden; }
        #cctv-stream { width: 100%; height: 100%; object-fit: cover; }
        .overlay-rec { position: absolute; top: 15px; left: 15px; color: var(--danger); font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; animation: blink 1s infinite; }
        
        /* LOGS */
        .log-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.6rem; }
        .log-entry { font-size: 0.75rem; padding: 0.75rem; background: #020617; border-left: 3px solid var(--accent-blue); border-radius: 4px; }
        .threat-alert { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.05); animation: shake 0.4s ease-in-out; }

        /* STATS */
        .stat-box { background: #020617; padding: 1rem; border-radius: 0.5rem; border: 1px solid #1e293b; margin-top: 10px; }
        .stat-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--accent-cyan); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-card">
            <h2 style="margin-bottom: 1.5rem;"><i class="fas fa-user-shield"></i> System Access</h2>
            <input type="text" id="username" placeholder="Operator ID">
            <input type="password" id="password" placeholder="Passkey">
            <button class="btn-auth" onclick="attemptLogin()">INITIATE LINK</button>
            <p id="error" style="color: var(--danger); font-size: 0.75rem; text-align: center; margin-top: 1rem;"></p>
        </div>
    </div>

    <div id="dashboard-container">
        <header>
            <div style="display:flex; align-items:center; gap: 1rem;">
                <i class="fas fa-satellite-dish" style="color:var(--accent-cyan)"></i>
                <span style="font-weight: 800; letter-spacing: 2px;">DCOL // NET-AD.V4</span>
            </div>
            <div id="real-time-clock" style="font-family: monospace; font-size: 1.1rem; color: var(--accent-cyan);">00:00:00</div>
        </header>

        <aside class="panel">
            <div class="panel-header"><i class="fas fa-microchip"></i> System Health</div>
            <div class="stat-box"><div class="stat-label">Network Latency</div><div class="stat-value">24ms</div></div>
            <div class="stat-box"><div class="stat-label">Encryption</div><div class="stat-value">AES-256</div></div>
            <div class="stat-box"><div class="stat-label">Server Load</div><div class="stat-value">14%</div></div>
            <div style="margin-top:auto; font-size: 0.7rem; color: #475569;">Singapore Node: Stable</div>
        </aside>

        <main class="panel" style="padding: 0.5rem;">
            <div class="viewport">
                <div class="overlay-rec"><i class="fas fa-circle"></i> LIVE STREAMING</div>
                <img id="cctv-stream">
                <div style="position:absolute; bottom:15px; left:15px; font-size: 0.7rem; background:rgba(0,0,0,0.6); padding:8px; border-radius:4px;">
                    SOURCE: CAM-01 // LOCATION: MAIN_ENTRY<br>RESOLUTION: 640x480 // FPS: 10
                </div>
            </div>
        </main>

        <aside class="panel">
            <div class="panel-header"><i class="fas fa-fingerprint"></i> Threat Analytics</div>
            <div id="logs" class="log-list">
                <p style="text-align:center; color:#475569; font-size: 0.8rem; margin-top: 2rem;">Awaiting Data Feed...</p>
            </div>
            <div class="stat-box" style="border-color: var(--accent-blue); margin-top: 15px;">
                <div class="stat-label">Blocked Attempts</div>
                <div id="threat-counter" class="stat-value" style="color:var(--success)">00</div>
            </div>
        </aside>
    </div>

    <script>
        // Real-Time Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('real-time-clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        async function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

        if (data.success) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'grid';
    
            // Use the full URL if relative path /video_feed is failing for them
            document.getElementById('cctv-stream').src = window.location.origin + "/video_feed";
    
            startLogPolling();
        } else {
                document.getElementById('error').innerText = "ALERT: " + data.message;
            }
        }

        async function startLogPolling() {
            setInterval(async () => {
                const res = await fetch('/api/security_logs');
                const logs = await res.json();
                const container = document.getElementById('logs');
                const counter = document.getElementById('threat-counter');
                let threats = 0;

                container.innerHTML = logs.map(l => {
                    if (l.is_threat) threats++;
                    return `
                        <div class="log-entry ${l.is_threat ? 'threat-alert' : ''}">
                            <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                <span style="font-weight:bold; color:${l.is_threat ? 'var(--danger)' : 'var(--accent-cyan)'}">${l.status}</span>
                                <span style="color:#64748b">${l.time}</span>
                            </div>
                            <div style="font-size:0.65rem; color:#94a3b8">IP: ${l.ip} | User: ${l.username}</div>
                        </div>
                    `;
                }).join('');

                counter.innerText = threats.toString().padStart(2, '0');
                counter.style.color = threats > 0 ? 'var(--danger)' : 'var(--success)';
            }, 3000);
        }
    </script>
</body>
</html>
